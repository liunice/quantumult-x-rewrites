# Plex - Rewrite display username
# Description: Modify the displayed username in Plex app via response body rewriting.
# Author: liunice

[rewrite_local]
^https://clients\.plex\.tv/api/v2/user\? url script-response-body https://raw.githubusercontent.com/liunice/quantumult-x-rewrites/main/plex/plex-username.js
^https://clients\.plex\.tv/api/v2/home/users url script-response-body https://raw.githubusercontent.com/liunice/quantumult-x-rewrites/main/plex/plex-username.js

[mitm]
hostname = clients.plex.tv
